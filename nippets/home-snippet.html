<div class="container">
  <div class="row">
    <div class="col-md-12 text-center">
      <a href="#" onclick="$dc.loadHome();">
        <img src="images/restaurant-logo.png" alt="Restaurant Logo">
      </a>
    </div>
  </div>
  
  <div class="row">
    <div class="col-md-4">
      <a href="#" onclick="$dc.loadMenuItems('L');" class="thumbnail">
        <img src="images/menu/L/L.jpg" alt="Menu">
        <div class="caption text-center">Menu</div>
      </a>
    </div>
    
    <div class="col-md-4">
      <a href="#" onclick="$dc.loadMenuItems({{randomCategoryShortName}});" class="thumbnail">
        <img src="images/specials.jpg" alt="Specials">
        <div class="caption text-center">Specials</div>
      </a>
    </div>
    
    <div class="col-md-4">
      <a href="#" onclick="$dc.loadMenuItems('');" class="thumbnail">
        <img src="images/map.jpg" alt="Map">
        <div class="caption text-center">Map</div>
      </a>
    </div>
  </div>
</div>
